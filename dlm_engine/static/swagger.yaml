openapi: 3.0.0
info:
  description: This is the DLM Engine API server
  version: 1.0.0
  title: DLM Engine
  contact:
    email: stephan.schultchen@gmail.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
tags:
  - name: Authenticate
    description: Authentication Related Stuff
  - name: Locks
    description: Lock Related Stuff
  - name: Permissions
    description: Authentication Related Stuff
  - name: Users
    description: Authentication Related Stuff
paths:
  /authenticate:
    delete:
      tags:
        - Authenticate
      description: Delete current authentication token
      responses:
        "200":
          description: Empty response on success
    post:
      tags:
        - Authenticate
      description: Authenticate user and return authentication token
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Authenticate_POST"
        description: Authentication credentials
      responses:
        "201":
          description: Empty response, with session headers set, on success
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/Authenticate_POST_result"
        "400":
          description: One or More parameters are invalid
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Invalid authentication information, or valid authentication token
            present
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/Error"
  "/locks/{lock}":
    delete:
      tags:
        - Locks
      description: Release lock.
      parameters:
        - name: lock
          in: path
          description: Lock Name
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Lock_DELETE"
        description: JSON Document with attributes that should be updated
      responses:
        "200":
          description: Empty response on success
        "403":
          description: Insufficient Permissions
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: ID not found
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/Error"
    get:
      tags:
        - Locks
      description: Get matching lock
      parameters:
        - name: lock
          in: path
          description: Lock Name
          required: true
          schema:
            type: string
        - name: fields
          in: query
          description: Filter Attributes that should be returned
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Lock Resource
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/Lock_GET"
        "403":
          description: Insufficient Permissions
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/Error"
    post:
      tags:
        - Locks
      description: Aquire lock.
      parameters:
        - name: lock
          in: path
          description: Lock Name
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Lock_POST"
        description: JSON Document with attributes that should be updated
      responses:
        "200":
          description: Lock Resource
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/Lock_GET"
        "403":
          description: Insufficient Permissions
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: ID not found
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/Error"
  /locks/_search:
    get:
      tags:
        - Locks
      description: Get all matching Locks
      parameters:
        - name: locks
          in: query
          description: "filter: regular expression"
          required: false
          schema:
            type: string
        - name: acquired_by
          in: query
          description: "filter: regular expression"
          required: false
          schema:
            type: string
        -
          description: "Filter attributes, valid values: id, acquired_by, acquired_since"
          in: query
          name: fields
          required: false
          type: string
        -
          description: "Sort results, prefix with - to invert, valid values: id"
          in: query
          name: sort
          required: false
          type: string
        -
          description: "pagination index"
          in: query
          name: page
          required: false
          type: integer
        -
          description: "pagination limit, valid values: 10, 25, 50, 100, 250, 500, 1000"
          in: query
          name: limit
          required: false
          type: integer
      responses:
        "200":
          description: List of lock objects
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/Lock_GETQ"
        "403":
          description: Insufficient Permissions
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/Error"
  "/permissions/{permission}":
    delete:
      tags:
        - Permissions
      description: Delete existing permission.
      parameters:
        - name: permission
          in: path
          description: Permission Name
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Empty response on success
        "403":
          description: Insufficient permission
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: ID not found
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/Error"
    get:
      tags:
        - Permissions
      description: Get matching permission
      parameters:
        - name: permission
          in: path
          description: Permission Name
          required: true
          schema:
            type: string
        - name: fields
          in: query
          description: Filter Attributes that should be returned
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Permission Resource
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/Permission_GET"
        "403":
          description: Insufficient permission
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/Error"
    post:
      tags:
        - Permissions
      description: |-
        Create a new permission, there can only be one permission object
        per user id / scope id combination.
      parameters:
        - name: permission
          in: path
          description: Permission Name
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Permission_POST"
        description: The resource JSON representation you want to create
      responses:
        "201":
          description: Created resource
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/Permission_GET"
        "400":
          description: One or More parameters are invalid
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: ID already exists
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/Error"
    put:
      tags:
        - Permissions
      description: Update existing permission.
      parameters:
        - name: permission
          in: path
          description: Permission Name
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Permission_PUT"
        description: JSON Document with attributes that should be updated
      responses:
        "200":
          description: Permission Resource
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/Permission_GET"
        "403":
          description: Insufficient permission
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: ID not found
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/Error"
  /permissions/_search:
    get:
      tags:
        - Permissions
      description: Get all matching Permissions
      parameters:
        - name: permissions
          in: query
          description: "filter: comma separated list of permissions"
          required: false
          schema:
            type: string
        - name: user
          in: query
          description: "filter: comma separated list of user ids"
          required: false
          schema:
            type: string
        - name: fields
          in: query
          description: Filter Attributes that should be returned
          required: false
          schema:
            type: string
        - name: sort
          in: query
          description: Comma separated list of attributes to sort result, valid values are
            id, permission and user, prefix with - to change order
          required: false
          schema:
            type: string
        - name: page
          in: query
          description: pagination index
          required: false
          schema:
            type: integer
        - name: limit
          in: query
          description: pagination limit
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of permission objects
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/Permission_GETQ"
        "403":
          description: Insufficient permission
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/Error"
  "/users/{user}":
    delete:
      tags:
        - Users
      description: Delete existing user.
      parameters:
        - name: user
          in: path
          description: User ID
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Empty response on success
        "403":
          description: Insufficient permission
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: ID not found
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/Error"
    get:
      tags:
        - Users
      description: Get get user
      parameters:
        - name: user
          in: path
          description: User ID
          required: true
          schema:
            type: string
        - name: fields
          in: query
          description: Filter Attributes that should be returned
          required: false
          schema:
            type: string
      responses:
        "200":
          description: User Resource
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/User_GET"
        "403":
          description: Insufficient permission
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: ID not found
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/Error"
    post:
      tags:
        - Users
      description: Create a new user, user id must be unique
      parameters:
        - name: user
          in: path
          description: User ID
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/User_POST"
        description: The user JSON representation you want to create
      responses:
        "201":
          description: Created resource
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/User_GET"
        "400":
          description: One or More parameters are invalid
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: ID already exists
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/Error"
    put:
      tags:
        - Users
      description: Update existing user.
      parameters:
        - name: user
          in: path
          description: User ID
          required: true
          schema:
            type: string
      requestBody:
        $ref: "#/components/requestBodies/User_PUT"
      responses:
        "200":
          description: User Resource
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/User_GET"
        "403":
          description: Insufficient permission
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: ID not found
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/Error"
  "/users/{user}/credentials/{credential}":
    delete:
      tags:
        - Users
      description: Delete user API credential.
      parameters:
        - name: credential
          in: path
          description: Credential ID
          required: true
          schema:
            type: string
        - name: user
          in: path
          description: User ID
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Empty response on success
        "403":
          description: Insufficient permission
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: ID not found
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/Error"
    get:
      tags:
        - Users
      description: Get User API Credentials Resource
      parameters:
        - name: credential
          in: path
          description: Credential ID
          required: true
          schema:
            type: string
        - name: user
          in: path
          description: User ID
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Credential Resource
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/Common_Credential_GET"
        "403":
          description: Insufficient permission
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: ID not found
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/Error"
    put:
      tags:
        - Users
      description: Update credential description
      parameters:
        - name: credential
          in: path
          description: Credential ID
          required: true
          schema:
            type: string
        - name: user
          in: path
          description: User ID
          required: true
          schema:
            type: string
      requestBody:
        $ref: "#/components/requestBodies/Common_Credential_POST"
      responses:
        "200":
          description: Credential Resource
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/Common_Credential_GET"
        "403":
          description: Insufficient permission
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: ID not found
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/Error"
  "/users/{user}/credentials":
    get:
      tags:
        - Users
      description: Get all credentials for this user
      parameters:
        - name: user
          in: path
          description: User ID
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Document with all credentials for this scope
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/Common_Credential_GETQ"
        "403":
          description: Insufficient permission
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: ID not found
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/Error"
    post:
      tags:
        - Users
      description: Create a new set of API credentials for this user
      parameters:
        - name: user
          in: path
          description: User ID
          required: true
          schema:
            type: string
      requestBody:
        $ref: "#/components/requestBodies/Common_Credential_POST2"
      responses:
        "200":
          description: Scope Credentials Resource
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/Common_Credential_POST_Result"
        "403":
          description: Insufficient permission
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: ID not found
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/Error"
  /users/_search:
    get:
      tags:
        - Users
      description: Get all matching Users
      parameters:
        - name: id
          in: query
          description: "filter: regular expression"
          required: false
          schema:
            type: string
        - name: fields
          in: query
          description: Filter Attributes that should be returned
          required: false
          schema:
            type: string
        - name: sort
          in: query
          description: Comma separated list of attributes to sort result, valid values are
            id, email, name, admin, prefix with - to change order
          required: false
          schema:
            type: string
        - name: page
          in: query
          description: pagination index
          required: false
          schema:
            type: integer
        - name: limit
          in: query
          description: pagination limit
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of user object
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/User_GETQ"
        "403":
          description: Insufficient permission
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/Error"
  /users/_self:
    delete:
      tags:
        - Users
      description: Delete existing user.
      responses:
        "200":
          description: Empty response on success
        "403":
          description: Insufficient permission
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: ID not found
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/Error"
    get:
      tags:
        - Users
      description: Return user resource, of the user executing this request.
      responses:
        "201":
          description: Created resource
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/User_GET"
        "404":
          description: ID not found
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/Error"
    put:
      tags:
        - Users
      description: Update existing user.
      requestBody:
        $ref: "#/components/requestBodies/User_PUT"
      responses:
        "200":
          description: User Resource
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/User_GET"
        "403":
          description: Insufficient permission
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: ID not found
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/Error"
  "/users/_self/credentials/{credential}":
    delete:
      tags:
        - Users
      description: Delete user API credential.
      parameters:
        - name: credential
          in: path
          description: Credential ID
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Empty response on success
        "403":
          description: Insufficient permission
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: ID not found
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/Error"
    get:
      tags:
        - Users
      description: Get User API Credentials Resource
      parameters:
        - name: credential
          in: path
          description: Credential ID
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Credential Resource
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/Common_Credential_GET"
        "403":
          description: Insufficient permission
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: ID not found
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/Error"
    put:
      tags:
        - Users
      description: update credential description
      parameters:
        - name: credential
          in: path
          description: Credential ID
          required: true
          schema:
            type: string
      requestBody:
        $ref: "#/components/requestBodies/Common_Credential_POST"
      responses:
        "200":
          description: Credential Resource
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/Common_Credential_GET"
        "403":
          description: Insufficient permission
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: ID not found
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/Error"
  /users/_self/credentials:
    get:
      tags:
        - Users
      description: Get all credentials for this user
      responses:
        "200":
          description: Document with all credentials for this scope
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/Common_Credential_GETQ"
        "403":
          description: Insufficient permission
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: ID not found
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/Error"
    post:
      tags:
        - Users
      description: Create a new set of API credentials for this user
      requestBody:
        $ref: "#/components/requestBodies/Common_Credential_POST2"
      responses:
        "200":
          description: Scope Credentials Resource
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/Common_Credential_POST_Result"
        "403":
          description: Insufficient permission
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: ID not found
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/Error"
servers:
  - url: /api/v1
components:
  requestBodies:
    Common_Credential_POST:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Common_Credential_POST"
      description: updated description
    Common_Credential_POST2:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Common_Credential_POST"
      description: Description of the credential that is beeing created
    User_PUT:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/User_PUT"
      description: JSON Document with attributes that should be updated
  schemas:
    Authenticate_POST:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - user
            - password
          properties:
            user:
              type: string
            password:
              type: string
    Authenticate_POST_result:
      type: object
      properties:
        data:
          type: object
          properties:
            id:
              type: string
            token:
              type: string
    Common_Credential_GET:
      type: object
      properties:
        data:
          type: object
          properties:
            id:
              type: string
            created:
              type: string
            description:
              type: string
    Common_Credential_GETQ:
      type: object
      properties:
        data:
          type: object
          properties:
            results:
              type: array
              items:
                $ref: "#/components/schemas/Common_Credential_GET"
    Common_Credential_POST:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - description
          properties:
            description:
              type: string
    Common_Credential_POST_Result:
      type: object
      properties:
        data:
          type: object
          properties:
            id:
              type: string
            created:
              type: string
            description:
              type: string
            secret:
              type: string
    Error:
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              detail:
                type: string
              title:
                type: string
    Lock_GET:
      type: object
      properties:
        data:
          type: object
          properties:
            id:
              type: string
            acquired_by:
              type: string
            acquired_since:
              type: string
              format: date-time
    Lock_GETQ:
      type: object
      properties:
        data:
          type: object
          properties:
            results:
              type: array
              items:
                $ref: "#/components/schemas/Lock_GET"
    Lock_DELETE:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          properties:
            force:
              type: boolean
              enum:
                - true
            acquired_by:
              type: string
            secret:
              type: string
    Lock_POST:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - acquired_by
          properties:
            acquired_by:
              type: string
            secret:
              type: string
    Permission_GET:
      type: object
      properties:
        data:
          type: object
          properties:
            id:
              type: string
            permissions:
              type: array
              items:
                type: string
            users:
              type: array
              items:
                type: string
    Permission_GETQ:
      type: object
      properties:
        data:
          type: object
          properties:
            results:
              type: array
              items:
                $ref: "#/components/schemas/Permission_GET"
    Permission_POST:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - permissions
            - users
          properties:
            permissions:
              type: array
              items:
